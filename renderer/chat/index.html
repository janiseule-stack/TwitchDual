<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>TwitchDual — Chat</title>
  <link rel="stylesheet" href="chat.css" />
</head>
<body>
  <div id="onair-bar">
    <span class="oa-line"></span>
    <span id="oa-label">● ON AIR</span>
  </div>
  <div id="head">
    <span id="title">Chat</span>
    <span id="mode"></span>
    <button id="settings-btn" title="Chat-Einstellungen">⚙</button>
    <div id="win-controls">
      <button id="win-min" title="Minimieren">─</button>
      <button id="win-max" title="Maximieren/Wiederherstellen">▢</button>
      <button id="win-close" title="Schließen">✕</button>
    </div>
  </div>
  <div id="settings-pop" class="hidden">
    <div class="opt-group">
      <div class="opt-group-title">Chat</div>
      <label class="opt-check"><input type="checkbox" id="opt-ts" checked /> Zeitstempel</label>
      <label class="opt-check"><input type="checkbox" id="opt-badges" checked /> Badges</label>
      <label id="opt-font-row" class="opt-row">Schriftgröße
        <input type="range" id="opt-font" min="11" max="22" step="1" />
        <span id="opt-font-val"></span>
      </label>
    </div>
    <div class="opt-group">
      <div class="opt-group-title">Darstellung</div>
      <div class="opt-presets-label">Presets</div>
      <div id="opt-presets" class="opt-presets"></div>
      <label class="opt-color-row opt-row">Video-Akzent
        <input type="color" id="opt-color-video" value="#35e0ff" />
      </label>
      <label class="opt-color-row opt-row">Chat-Akzent
        <input type="color" id="opt-color-chat" value="#ff4fa3" />
      </label>
      <label class="opt-alpha-row opt-row">Deckkraft (Chat)
        <input type="range" id="opt-alpha-chat" min="0" max="100" step="5" value="100" />
        <span id="opt-alpha-chat-val" class="opt-alpha-val">100%</span>
      </label>
    </div>
    <button id="opt-color-reset" type="button">Farben zurücksetzen</button>
  </div>
  <div id="messages"></div>
  <div id="composer">
    <button id="new-msgs" class="hidden">↓ neue Nachrichten</button>
    <span id="room-state" class="hidden"></span>
    <div id="chat-input" contenteditable="false" data-placeholder="Zum Chatten anmelden"></div>
    <button id="emote-btn" type="button" title="Emotes" aria-label="Emotes" disabled><img src="https://cdn.betterttv.net/emote/5f1b0186cf6d2144653d2970/1x.webp" alt="catJAM"></button>
    <button id="chat-send" type="button" disabled>Senden</button>
    <div id="chat-error" class="hidden"></div>
    <div id="emote-panel" class="hidden">
      <div class="ep-section">Channel</div>
      <div id="ep-channel" class="ep-grid"></div>
      <div class="ep-section">Deine Emotes</div>
      <div id="ep-user" class="ep-grid"></div>
    </div>
    <div id="ac-bar" class="hidden"></div>
  </div>
  <div id="emote-tip" class="hidden">
    <img id="emote-tip-img" alt="" />
    <div id="emote-tip-name"></div>
    <div id="emote-tip-src"></div>
  </div>
  <div id="user-card" class="hidden">
    <div id="uc-head">
      <span id="uc-badges"></span>
      <span id="uc-name"></span>
      <button id="uc-copy" title="Name kopieren">📋</button>
    </div>
    <div id="uc-msgs"></div>
  </div>
  <div id="footer">
    <span id="conn">nicht verbunden</span>
    <span id="rate"></span>
  </div>

  <script src="../lib/emote-text.js"></script>
  <script src="../lib/irc.js"></script>
  <script src="../lib/badges.js"></script>
  <script src="../lib/backoff.js"></script>
  <script src="../lib/vod-replay.js"></script>
  <script src="../lib/chat-ui.js"></script>
  <script src="../lib/theme.js"></script>
  <script src="chat.js"></script>
</body>
</html>
